# Exemple Render.com — service web Django gratuit (limites applicables)
services:
  - type: web
    name: ong-impact-portal
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ong-portal-db
          property: connectionString

databases:
  - name: ong-portal-db
    plan: free
