{% extends "base.html" %}
{% block title %}{{ document.title }} — {{ site_name }}{% endblock %}
{% block content %}
<article class="container page">
  <h1>{{ document.title }}</h1>
  <p>{{ document.summary }}</p>
  {% if document.file %}<p><a class="btn btn-primary" href="{{ document.file.url }}" download>Télécharger (public)</a></p>{% endif %}
</article>
{% endblock %}
