{% extends "base.html" %}
{% block title %}{{ article.title }} — {{ site_name }}{% endblock %}
{% block content %}
<article class="container page">
  <h1>{{ article.title }}</h1>
  <p class="meta">{{ article.published_at|date:"d F Y" }}</p>
  <div class="prose">{{ article.body|linebreaks }}</div>
</article>
{% endblock %}
