{% extends "base.html" %}
{% block title %}{{ page.title }} — {{ site_name }}{% endblock %}
{% block content %}
<article class="container page">
  <h1>{{ page.title }}</h1>
  {% if page.summary %}<p class="lead">{{ page.summary }}</p>{% endif %}
  <div class="prose">{{ page.body|linebreaks }}</div>
</article>
{% endblock %}
